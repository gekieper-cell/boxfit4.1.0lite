{% extends "base.html" %}
{% block title %}Nuevo Alumno{% endblock %}

{% block content %}
<div class="mb-5">
    <h2 class="text-xl font-semibold">Nuevo Alumno</h2>
    <p class="text-gray-500 text-sm">Registrar un nuevo alumno en el sistema</p>
</div>

<div class="card max-w-3xl">
    <div class="card-body">
        <form method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="form-group">
                    <label class="form-label">Nombre completo *</label>
                    <input type="text" name="nombre" required class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">DNI *</label>
                    <input type="text" name="dni" required class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" placeholder="Ej: 5491112345678">
                </div>
                <div class="form-group">
                    <label class="form-label">Contacto de emergencia</label>
                    <input type="text" name="contacto_emergencia" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Teléfono emergencia</label>
                    <input type="text" name="telefono_emergencia" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Fecha de inicio</label>
                    <input type="date" name="fecha_inicio" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Tipo de clase</label>
                    <select name="tipo_clase" class="form-control">
                        <option value="">Seleccionar</option>
                        <option value="2 clases por semana">2 clases por semana</option>
                        <option value="3 clases por semana">3 clases por semana</option>
                        <option value="Libre">Libre (acceso ilimitado)</option>
                        <option value="Personalizado">Personalizado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Valor de cuota ($)</label>
                    <input type="number" name="valor_cuota" value="15000" step="0.01" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Forma de pago</label>
                    <select name="forma_pago" class="form-control">
                        <option value="">Seleccionar</option>
                        <option value="efectivo">Efectivo</option>
                        <option value="transferencia">Transferencia</option>
                        <option value="tarjeta">Tarjeta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Clases totales (para planes por clase)</label>
                    <input type="number" name="clases_totales" value="0" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Último pago</label>
                    <input type="date" name="ultimo_pago" class="form-control">
                </div>
            </div>
            <div class="flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Guardar Alumno
                </button>
                <a href="{{ url_for('alumnos') }}" class="btn btn-outline">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
