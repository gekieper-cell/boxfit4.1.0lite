<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Boxing Club El Profe Medina{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;700&display=swap');
        
        * { 
            font-family: 'Roboto', system-ui, -apple-system, sans-serif; 
            box-sizing: border-box;
        }
        
        /* FONDO BOXING PRO */
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            background-attachment: fixed;
            color: #e5e7eb;
            min-height: 100vh;
        }
        
        .hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: -1;
        }
        
        /* LOGO BACKGROUND */
        .logo-bg {
            background: url('/static/images/logo-boxing.jpg') center/cover no-repeat fixed;
            background-blend-mode: overlay;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            z-index: -2;
        }
        
        /* SIDEBAR PREMIUM */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, rgba(26,26,46,0.95) 100%);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            z-index: 50;
            box-shadow: 4px 0 40px rgba(0,0,0,0.5);
        }
        
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        
        /* LOGO-MINI RESPONSIVE 🥊 */
        .logo-mini {
            /* DESKTOP */
            width: 60px;
            height: 60px;
            background: url('/static/images/logo-mini.jpg') center/cover no-repeat;
            border-radius: 16px;
            margin: 0 auto 16px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        
        /* TABLET */
        @media (max-width: 1024px) {
            .logo-mini {
                width: 52px;
                height: 52px;
                border-radius: 14px;
            }
        }
        
        /* MÓVIL */
        @media (max-width: 768px) {
            .logo-mini {
                width: 44px;
                height: 44px;
                border-radius: 12px;
                margin-bottom: 12px;
                box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            }
            .sidebar-header {
                padding: 16px 12px !important;
            }
        }
        
        /* MÓVIL PEQUEÑO */
        @media (max-width: 480px) {
            .logo-mini {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                margin-bottom: 10px;
            }
            .sidebar h1 {
                font-size: 20px !important;
                letter-spacing: 1px !important;
            }
        }
        
        .sidebar h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            background: linear-gradient(45deg, #10b981, white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            letter-spacing: 2px;
        }
        
        .user-info {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
        }
        
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(45deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 18px;
        }
        
        /* NAVEGACIÓN */
        .sidebar-nav {
            padding: 20px 0;
        }
        
        .sidebar a {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .sidebar a i { 
            width: 20px; 
            margin-right: 16px;
            font-size: 16px;
            opacity: 0.8;
        }
        
        .sidebar a:hover {
            background: rgba(16,185,129,0.2);
            color: white;
            border-left-color: #10b981;
            transform: translateX(4px);
        }
        
        .sidebar a.active {
            background: linear-gradient(90deg, rgba(16,185,129,0.3), transparent);
            color: white;
            border-left-color: #10b981;
        }
        
        /* MAIN CONTENT */
        .main-content {
            margin-left: 280px;
            padding: 32px;
            min-height: 100vh;
        }
        
        /* CARDS GLASSMORPHISM */
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .card-header {
            padding: 24px 28px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-body {
            padding: 28px;
        }
        
        /* BOTONES PREMIUM */
        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary { 
            background: linear-gradient(45deg, #10b981, #059669);
            color: white;
            box-shadow: 0 8px 25px rgba(16,185,129,0.4);
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(16,185,129,0.6);
        }
        
        .btn-success { 
            background: linear-gradient(45deg, #10b981, #047857);
            color: white;
            box-shadow: 0 8px 25px rgba(16,185,129,0.4);
        }
        
        .btn-danger { 
            background: linear-gradient(45deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 8px 25px rgba(239,68,68,0.4);
        }
        
        .btn-warning { 
            background: linear-gradient(45deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 8px 25px rgba(245,158,11,0.4);
        }
        
        /* FORMULARIOS */
        .form-control
